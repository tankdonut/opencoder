name: Prune GHCR Images

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

permissions:
  packages: write

jobs:
  prune:
    uses: tankdonut/github-actions/.github/workflows/prune-ghcr.yaml@v1
    with:
      packages: '["opencoder"]'
      exclude-latest: true
      exclude-semver: true
      keep-n-tagged: "10"
    secrets: inherit
